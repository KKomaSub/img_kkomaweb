name: Deploy ZIP to Root
on:
  push:
    paths:
      - 'uploads/*.zip'

permissions:
  contents: write

jobs:
  deploy-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Clean Root and Extract ZIP
        run: |
          # 1. uploads 폴더와 .git 폴더, 워크플로우 파일을 제외한 모든 파일 삭제
          # (기존 파일을 지워야 압축 해제 시 깨끗하게 교체됩니다)
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' ! -name 'uploads' -exec rm -rf {} +

          # 2. ZIP 파일 압축 해제 (최상위에 바로 추출)
          # 여러 개가 있을 경우를 대비해 루프 실행
          for file in uploads/*.zip; do
            echo "Extracting $file to root..."
            unzip -o "$file" -d ./
            
            # 3. 원본 ZIP 파일 삭제
            rm "$file"
          done

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Deploy: Extract latest ZIP to root" && git push)
