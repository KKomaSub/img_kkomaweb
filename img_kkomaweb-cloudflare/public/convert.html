<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APNG → MP4 변환</title>
<style>
  body { font-family:"Pretendard", Arial, sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#eef1f7; padding:20px; color:#222; }
  .card { width:100%; max-width:560px; background:rgba(255,255,255,.78); border:1px solid rgba(255,255,255,.65); border-radius:18px; box-shadow:0 10px 28px rgba(0,0,0,.1); padding:28px; text-align:center; }
  h1 { margin-top:0; }
  button, a { width:100%; display:inline-flex; justify-content:center; align-items:center; margin-top:12px; padding:13px 18px; border-radius:12px; border:0; background:#4A75FF; color:white; font-size:15px; font-weight:800; text-decoration:none; cursor:pointer; }
  a.secondary, button.secondary { background:#fff; color:#4A75FF; border:1px solid #d9e1ff; }
  #message { margin-top:14px; font-weight:700; color:#344054; min-height:24px; }
  .progress { height:9px; border-radius:999px; background:#e5e7eb; overflow:hidden; margin-top:14px; }
  .progress > div { height:100%; width:0%; background:#4A75FF; transition:width .25s; }
  .notice { font-size:13px; color:#667085; line-height:1.55; margin-top:12px; }
</style>
</head>
<body>
<div class="card">
  <h1>APNG → MP4 변환</h1>
  <p class="notice">Cloudflare Pages 서버에서 네이티브 ffmpeg를 실행할 수 없어서, 이 페이지가 브라우저의 ffmpeg.wasm으로 APNG를 MP4로 변환합니다.</p>
  <button id="convertButton">MP4 변환/다운로드 시작</button>
  <a id="rawButton" class="secondary" target="_blank" rel="noreferrer">원본 APNG(.png) 열기</a>
  <div class="progress"><div id="bar"></div></div>
  <div id="message"></div>
</div>
<script type="module">
import { basename, convertApngUrlToMp4, downloadBlob } from "/assets/media-tools.js";
const params = new URLSearchParams(location.search);
const id = params.get("id");
const name = params.get("name") || "";
const auto = params.get("auto") === "1";
const qs = new URLSearchParams({ id });
if (name) qs.set("name", name);
const apiRaw = `/api/image?${qs}`;
const publicRaw = `/?id=${encodeURIComponent(id || "")}&raw=1`;
const message = document.querySelector("#message");
const bar = document.querySelector("#bar");
const convertButton = document.querySelector("#convertButton");
const rawButton = document.querySelector("#rawButton");
rawButton.href = publicRaw;
function status(text, progress = null) {
  message.textContent = text || "";
  if (progress !== null) bar.style.width = `${Math.max(0, Math.min(100, progress))}%`;
}
async function run() {
  if (!id) return status("id가 없습니다.");
  convertButton.disabled = true;
  try {
    status("변환 준비 중...", 3);
    const blob = await convertApngUrlToMp4(apiRaw, id, msg => status(msg));
    downloadBlob(blob, `${basename(id)}.mp4`);
    status("MP4 다운로드 준비 완료", 100);
  } catch (err) {
    console.error(err);
    status(err.message || "변환 실패");
  } finally {
    convertButton.disabled = false;
  }
}
convertButton.onclick = run;
if (auto) run();
</script>
</body>
</html>
